<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Royal – Kristall Pur</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sand: #faf9f6; --lava: #1a1a1a; --gold: #c9a96e;
  --soft: #f4f3ef; --text: #111;
}
body { background: transparent; color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; display: flex; flex-direction: column; align-items: center; padding: 0; }
header { text-align: center; margin-bottom: 36px; }
.brand { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(2.2rem, 6vw, 3.6rem); letter-spacing: 0.18em; color: var(--lava); line-height: 1; }
.tagline { font-size: 16px; letter-spacing: 0.2em; text-transform: uppercase; color: #111; margin-top: 8px; }
.divider { width: 48px; height: 1px; background: var(--gold); margin: 20px auto 0; }
.card { background: transparent; padding: 20px 28px 60px; width: 100%; max-width: 720px; }
.bracelet-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; background: var(--soft); padding: 24px 20px 18px; border-radius: 1px; margin-bottom: 28px; }
.preview-label { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: #111; font-style: italic; text-align: center; min-height: 1.4em; }
.preview-label.filled { font-style: normal; font-size: 16px; }
.section-label { font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: #111; margin-bottom: 12px; font-weight: 500; }
.section { margin-bottom: 28px; }
.option-row { display: flex; gap: 10px; flex-wrap: wrap; }
.option-btn { border: 1px solid #ddd; background: transparent; padding: 10px 20px; border-radius: 1px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 300; color: var(--text); transition: all 0.2s; }
.option-btn:hover:not(.active) { border-color: #111; }
.option-btn.active { border-color: #111; background: var(--gold); color: #fff; }
.count-options { display: flex; gap: 10px; flex-wrap: wrap; }
.count-btn { border: 1px solid #ddd; background: transparent; padding: 10px 20px; border-radius: 1px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 300; color: var(--text); transition: all 0.2s; }
.count-btn.active { border-color: #111; background: var(--gold); color: #fff; }
.count-btn:hover:not(.active) { border-color: #111; }
.color-slot { margin-bottom: 16px; }
.slot-label { font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; color: #111; margin-bottom: 8px; font-weight: 500; }
.sequence-hint { font-size: 13px; color: #888; letter-spacing: 0.05em; margin-bottom: 14px; }
.color-options { display: flex; flex-wrap: wrap; gap: 7px; }
.color-chip { display: flex; align-items: center; gap: 7px; border: 1px solid #ddd; padding: 6px 10px; border-radius: 1px; cursor: pointer; font-size: 15px; transition: all 0.2s; background: transparent; font-family: 'Jost', sans-serif; font-weight: 300; color: var(--text); }
.color-chip:hover { border-color: #111; }
.color-chip.active { border-color: #111; background: #111; color: #fff; }
.color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
.summary-box { display: none; border: 1px solid #ddd; border-radius: 1px; padding: 24px; margin-bottom: 20px; }
.summary-box.visible { display: block; }
.summary-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; }
.summary-text { font-size: 15px; line-height: 1.8; white-space: pre-line; margin-bottom: 16px; }
.copy-btn { border: 1px solid #111; background: transparent; padding: 10px 24px; border-radius: 1px; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 14px; letter-spacing: 0.1em; color: #111; transition: all 0.2s; }
.copy-btn:hover { background: #111; color: #fff; }
.next-step { display: none; background: #fff; color: #111; border: 1px solid #ddd; border-radius: 1px; padding: 18px 20px; text-align: center; }
.next-step.visible { display: block; }
.next-step-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #111; margin-bottom: 6px; }
.next-step-text { font-size: 15px; letter-spacing: 0.06em; line-height: 1.6; color: #111; }
</style>
</head>
<body>


<div style="width:48px; height:1px; background:#c9a96e; margin:60px auto 16px;"></div>
<h2 style="font-family:'Jost',sans-serif; font-weight:300; font-size:clamp(1.4rem,3.5vw,2rem); letter-spacing:0.18em; text-transform:uppercase; text-align:center; color:#111; margin-bottom:52px;">Kristall Pur Armband Design</h2>

<div class="card">
  <div class="bracelet-wrap">
    <canvas id="bracelet-canvas" width="300" height="300"></canvas>
    <div class="preview-label" id="preview-label">Wähle deine Kristallfarben und deine Edelstahlperle.</div>
  </div>

  <!-- 1: Edelstahl -->
  <div class="section">
    <div class="section-label">1 · Edelstahl</div>
    <div class="option-row" id="metal-row">
      <button class="option-btn" onclick="setMetal('Silber', this)">Silber</button>
      <button class="option-btn" onclick="setMetal('Gold', this)">Gold</button>
    </div>
  </div>

  <!-- 2: Anzahl Farben -->
  <div class="section">
    <div class="section-label">2 · Wie viele Kristallfarben?</div>
    <div class="count-options">
      <button class="count-btn" onclick="setCount(1, this)">Einfarbig</button>
      <button class="count-btn" onclick="setCount(2, this)">2 Farben</button>
      <button class="count-btn" onclick="setCount(3, this)">3 Farben</button>
      <button class="count-btn" onclick="setCount(4, this)">4 Farben</button>
      <button class="count-btn" onclick="setCount(5, this)">5 Farben</button>
    </div>
  </div>

  <!-- 3: Farbreihenfolge -->
  <div class="section" id="color-section" style="display:none">
    <div class="section-label">3 · Kristallfarben wählen</div>
    <div id="slots-wrapper"></div>
  </div>

  <div class="summary-box" id="summary-box">
    <div class="summary-title">Deine Reihenfolge</div>
    <div class="summary-text" id="summary-text"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyText()">Text kopieren</button>
  </div>

  <div class="next-step" id="next-step">
    <div class="next-step-label">Schritt 4</div>
    <div class="next-step-text">Kopiere den Text. Bestelle dein Kristall Pur Wunsch-Armband direkt oder schreibe mir per WhatsApp, wenn du Fragen hast.</div>
  </div>
</div>

<script>
const COLORS = [
  { name: 'Capri Blau',                hex: '#1a6bb5', shimmer: '#5aaae8', shape: 'round'  },
  { name: 'Himmelblau',                hex: '#6CB8D8', shimmer: '#A0D4EC', shape: 'bicone' },
  { name: 'Luft · ein Hauch von Blau', hex: '#C0D8EE', shimmer: '#E0F0FF', shape: 'bicone' },
  { name: 'Meeresblau',                hex: '#1A508C', shimmer: '#3A78B8', shape: 'bicone' },
  { name: 'Montana Blau',              hex: '#1A3D78', shimmer: '#3060A8', shape: 'round'  },
  { name: 'Türkise Lagune',            hex: '#48B8C0', shimmer: '#7AD4DA', shape: 'bicone' },
  { name: 'Atlantik Türkis matt',      hex: '#3D8880', shimmer: '#68AEA8', shape: 'bicone' },
  { name: 'Lanzarote Türkis hell',     hex: '#7ACECE', shimmer: '#A8E0E0', shape: 'round'  },
  { name: 'El Golfo Grün',             hex: '#3A7828', shimmer: '#60A040', shape: 'bicone' },
  { name: 'Zitrus Grün',               hex: '#B8D828', shimmer: '#D0EC60', shape: 'bicone' },
  { name: 'Sonnenschein Matt',         hex: '#f5eb79', shimmer: '#faf4a8', shape: 'round'  },
  { name: 'Venus',                     hex: '#A87848', shimmer: '#D0A870', shape: 'round'  },
  { name: 'Manrique Orange',           hex: '#F07818', shimmer: '#F8A860', shape: 'bicone' },
  { name: 'Glühende Lava',             hex: '#E05040', shimmer: '#F09078', shape: 'bicone' },
  { name: 'Pink Safir Matt',           hex: '#E878C0', shimmer: '#F4AADA', shape: 'bicone' },
  { name: 'Rosenwasser Opal',          hex: '#F5C8D0', shimmer: '#FFE0E8', shape: 'bicone' },
  { name: 'Pinke Buganvilla',          hex: '#D42882', shimmer: '#F060B0', shape: 'bicone' },
  { name: 'Pinke Buganvilla Matt',     hex: '#BE1F75', shimmer: '#E050A0', shape: 'bicone' },
  { name: 'Opal Weiss',                hex: '#F0EAE0', shimmer: '#FFF8F0', shape: 'round'  },
];

const EMPTY = { hex: '#d4d0c8', shimmer: '#e8e4dc', shape: 'bicone' };

// Bracelet geometry
const N_BEADS    = 36;   // total positions (0 = barrel bead, 1–35 = crystals)
const R_CRYSTAL  = 10;   // crystal bead radius
const R_BARREL   = 10;   // barrel bead same size as crystals

const state = { metal: null, count: null, slots: [] };

// ── Farben ───────────────────────────────────────────────────

function getMetalColor() {
  if (state.metal === 'Gold') return { hex: '#c9a96e', shimmer: '#e8d49a' };
  return { hex: '#a8b0b8', shimmer: '#d0d6da' };
}

function getCrystalAt(crystalIdx) {
  if (!state.count || state.slots.length === 0) return EMPTY;
  const slotIdx = crystalIdx % state.count;
  const name = state.slots[slotIdx];
  if (!name) return EMPTY;
  return COLORS.find(c => c.name === name) || EMPTY;
}

// ── Zeichenfunktionen ─────────────────────────────────────────

function darken(hex, f) {
  return `rgb(${[1,3,5].map(i => Math.round(parseInt(hex.slice(i,i+2),16)*f)).join(',')})`;
}

function drawSphere(ctx, x, y, r, base, shimmer, gloss) {
  const g = ctx.createRadialGradient(x-r*.35,y-r*.38,r*.04,x+r*.1,y+r*.1,r*1.05);
  g.addColorStop(0,shimmer); g.addColorStop(.42,base); g.addColorStop(1,darken(base,.48));
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  const sh = ctx.createRadialGradient(x-r*.28,y-r*.32,0,x-r*.28,y-r*.32,r*.4);
  sh.addColorStop(0,`rgba(255,255,255,${gloss})`); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=sh; ctx.fill();
}

function drawBicone(ctx, x, y, r, base, shimmer, gloss, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle || 0);
  const w = r * 0.96, h = r;
  ctx.beginPath();
  ctx.moveTo(0,-h);
  ctx.bezierCurveTo( w*.45,-h*.70,  w,-h*.12,  w, 0);
  ctx.bezierCurveTo( w, h*.12,  w*.45, h*.70,  0, h);
  ctx.bezierCurveTo(-w*.45, h*.70, -w, h*.12, -w, 0);
  ctx.bezierCurveTo(-w,-h*.12, -w*.45,-h*.70,  0,-h);
  ctx.closePath();
  const g = ctx.createRadialGradient(-w*.38,-h*.36,h*.04, w*.1, h*.1,h);
  g.addColorStop(0,shimmer); g.addColorStop(.42,base); g.addColorStop(1,darken(base,.48));
  ctx.fillStyle=g; ctx.fill();
  const sh = ctx.createRadialGradient(-w*.3,-h*.3,0,-w*.3,-h*.3,h*.42);
  sh.addColorStop(0,`rgba(255,255,255,${gloss})`); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fill();
  ctx.restore();
}

function drawBarrel(ctx, x, y, r, base, shimmer, gloss, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle || 0);
  const w = r * 0.92, h = r * 1.25;
  const we = r * 0.62;
  ctx.beginPath();
  ctx.moveTo(0, -h);
  ctx.bezierCurveTo( we*1.3, -h*.88,  w, -h*.32,  w, 0);
  ctx.bezierCurveTo( w,  h*.32,  we*1.3,  h*.88,  0,  h);
  ctx.bezierCurveTo(-we*1.3,  h*.88, -w,  h*.32, -w, 0);
  ctx.bezierCurveTo(-w, -h*.32, -we*1.3, -h*.88,  0, -h);
  ctx.closePath();
  const g = ctx.createRadialGradient(-w*.3,-h*.3,h*.04, w*.1, h*.1, h);
  g.addColorStop(0,shimmer); g.addColorStop(.42,base); g.addColorStop(1,darken(base,.48));
  ctx.fillStyle=g; ctx.fill();
  const sh = ctx.createRadialGradient(-w*.28,-h*.28,0,-w*.28,-h*.28,h*.4);
  sh.addColorStop(0,`rgba(255,255,255,${gloss})`); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fill();
  ctx.restore();
}

// ── Armband zeichnen ──────────────────────────────────────────

function drawCanvas() {
  const canvas = document.getElementById('bracelet-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  // Dynamischer Ringradius: alle Perlen gleich groß → einfache Formel
  const ringR = Math.min(
    R_CRYSTAL / Math.sin(Math.PI / N_BEADS),
    W / 2 - R_CRYSTAL - 8
  );

  // Subtile Führungslinie
  ctx.beginPath();
  ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(120,110,100,0.1)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Positionen berechnen
  const beads = [];
  for (let i = 0; i < N_BEADS; i++) {
    const a = (i / N_BEADS) * 2 * Math.PI - Math.PI / 2;
    beads.push({
      x:    cx + ringR * Math.cos(a),
      y:    cy + ringR * Math.sin(a),
      rot:  a + Math.PI / 2,
      idx:  i,
    });
  }

  // Oben (weit) zuerst, unten (nah) zuletzt
  beads.slice().sort((a, b) => a.y - b.y).forEach(({ x, y, rot, idx }) => {
    const mc = getMetalColor();
    if (idx === 0) {
      // Barrel-Perle (Edelstahl)
      drawBarrel(ctx, x, y, R_BARREL, mc.hex, mc.shimmer, 0.82, rot - Math.PI / 2);
    } else {
      const c = getCrystalAt(idx - 1);
      if (c.shape === 'bicone') {
        drawBicone(ctx, x, y, R_CRYSTAL, c.hex, c.shimmer, 0.72, rot);
      } else {
        // Runde Kristalle: ebenfalls rotieren (symmetrisch, kein sichtbarer Effekt)
        drawSphere(ctx, x, y, R_CRYSTAL, c.hex, c.shimmer, 0.65);
      }
    }
  });

  updateLabel();
  updateSummary();
}

// ── UI-Logik ──────────────────────────────────────────────────

function setMetal(metal, btn) {
  state.metal = metal;
  document.querySelectorAll('#metal-row .option-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawCanvas();
}

function setCount(n, btn) {
  state.count = n;
  state.slots = Array(n).fill(null);
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSlots();
  document.getElementById('color-section').style.display = 'block';
  drawCanvas();
}

function renderSlots() {
  const wrapper = document.getElementById('slots-wrapper');
  wrapper.innerHTML = '';

  // Reihenfolge-Hinweis ab 4 Farben
  if (state.count >= 4) {
    const hint = document.createElement('div');
    hint.className = 'sequence-hint';
    const arrow = Array.from({length: state.count}, (_, i) => `Farbe ${i+1}`).join(' → ');
    hint.textContent = `Die Reihenfolge ${arrow} wiederholt sich rund ums Armband.`;
    wrapper.appendChild(hint);
  }

  const labels = state.count === 1
    ? ['Kristallfarbe']
    : Array.from({length: state.count}, (_, i) => `Farbe ${i+1}`);

  for (let i = 0; i < state.count; i++) {
    const div = document.createElement('div');
    div.className = 'color-slot';
    div.innerHTML = `<div class="slot-label">${labels[i]}</div><div class="color-options" id="slot-${i}"></div>`;
    wrapper.appendChild(div);
    const container = document.getElementById(`slot-${i}`);
    COLORS.forEach(c => {
      const chip = document.createElement('button');
      chip.className = 'color-chip';
      chip.innerHTML = `<span class="color-dot" style="background:${c.hex}"></span>${c.name}`;
      if (state.slots[i] === c.name) chip.classList.add('active');
      chip.onclick = () => {
        state.slots[i] = c.name;
        container.querySelectorAll('.color-chip').forEach(b => b.classList.remove('active'));
        chip.classList.add('active');
        drawCanvas();
      };
      container.appendChild(chip);
    });
  }
}

function isReady() {
  return state.metal && state.count &&
         state.slots.length === state.count &&
         state.slots.every(Boolean);
}

function updateLabel() {
  const label = document.getElementById('preview-label');
  if (isReady()) {
    const colorStr = state.count === 1 ? state.slots[0] : state.slots.join(' · ');
    label.textContent = `Kristall Pur · ${colorStr} · ${state.metal}`;
    label.className = 'preview-label filled';
  } else {
    label.textContent = 'Wähle die Edelstahl Perle und deine Kristallfarben.';
    label.className = 'preview-label';
  }
}

function updateSummary() {
  if (isReady()) {
    document.getElementById('summary-box').classList.add('visible');
    const s = buildSummary();
    document.getElementById('summary-text').innerHTML =
      '<strong>' + s.split('\n')[0] + '</strong>\n' + s.split('\n').slice(1).join('\n');
    document.getElementById('next-step').classList.add('visible');
  } else {
    document.getElementById('summary-box').classList.remove('visible');
    document.getElementById('next-step').classList.remove('visible');
  }
}

function buildSummary() {
  let colorLines;
  if (state.count === 1) {
    colorLines = `Kristallfarbe: ${state.slots[0]}`;
  } else {
    colorLines = state.slots.map((s, i) => `Farbe ${i+1}: ${s}`).join('\n');
    if (state.count >= 4) {
      const arrow = state.slots.map((_, i) => `Farbe ${i+1}`).join(' → ');
      colorLines += `\nReihenfolge: ${arrow}`;
    }
  }
  return `Kristall Pur\n${colorLines}\nEdelstahl: ${state.metal}\nPreis: 50 €`;
}

function copyText() {
  const text = document.getElementById('summary-text').innerText;
  const btn = document.getElementById('copy-btn');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Kopiert ✓';
      setTimeout(() => { btn.textContent = 'Text kopieren'; }, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
    ta.style.left = '-9999px'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.textContent = 'Kopiert ✓';
    setTimeout(() => { btn.textContent = 'Text kopieren'; }, 2000);
  }
}

// Initial draw
drawCanvas();
</script>
<script>
function sendHeight() {
  window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
}
const ro = new ResizeObserver(sendHeight);
ro.observe(document.body);
sendHeight();
</script></body>
</html>
